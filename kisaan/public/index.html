<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#4CAF50" />

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/khetihat.png" />

    <title>Khetihat - Agricultural Marketplace for Farmers</title>
    
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Khetihat",
      "url": "https://khetihat.com",
      "logo": "https://khetihat.com/khetihat.png",
      "description": "Agricultural marketplace connecting farmers, buyers, and sellers",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://khetihat.com/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
